<!DOCTYPE html>
<html>
<head>
    <title>Sahana Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h2>Sahana</h2>
    <div>
        <a href="#">Projects</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Hi, I'm Sahana 👋</h1>
    <p>Full Stack Developer | AI Enthusiast</p>
</div>

<!-- Projects -->
<div class="section">
    <h2>My Projects</h2>
    <div class="projects">
        <div class="card">
            <h3>Notes App</h3>
            <p>Save notes in cloud</p>
        </div>

        <div class="card">
            <h3>Expense Tracker</h3>
            <p>Track your spending</p>
        </div>

        <div class="card">
            <h3>Portfolio</h3>
            <p>My personal website</p>
        </div>
    </div>
</div>

<!-- Chat Box -->
<div class="chat-container">
    <div class="chat-header">💬 Chat with me</div>
    <div id="chat-box"></div>
    <input type="text" id="msg" placeholder="Ask something...">
    <button onclick="sendMsg()">Send</button>
</div>

<script>
function sendMsg() {
    let msg = document.getElementById("msg").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chat-box").innerHTML += 
        "<p><b>You:</b> " + msg + "</p>" +
        "<p><b>AI:</b> " + data.reply + "</p>";
    });
}
</script>

</body>
</html>
