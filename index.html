<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }
        header {
            background: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }
        section {
            padding: 20px;
            margin: 10px;
            background: white;
            border-radius: 10px;
        }
        h2 {
            color: #333;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background: #333;
            color: white;
            padding: 10px;
            border: none;
        }
    </style>
</head>

<body>

<header>
    <h1>Sahana Harish</h1>
    <p>Web Developer</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I am a student passionate about web development and building projects.</p>
</section>

<section>
    <h2>Skills</h2>
    <ul>
        <li>HTML, CSS, JavaScript</li>
        <li>Python (Flask)</li>
        <li>Database (SQLite/MySQL)</li>
    </ul>
</section>

<section>
    <h2>Projects</h2>
    <p>Portfolio Website, Mini Apps, etc.</p>
</section>

<section>
    <h2>Contact Me</h2>
    <form action="http://localhost:5000/submit" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

</body>
</html>
