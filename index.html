<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f4f4;
        color: #333;
    }
    header {
        background: #007bff;
        color: white;
        padding: 20px;
        text-align: center;
    }
    section {
        max-width: 800px;
        margin: 20px auto;
        padding: 20px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
    }
    button {
        background: #007bff;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background: #0056b3;
    }
</style>
</head>

<body>

<header>
    <h1>Sahana Harish</h1>
    <p>Web Developer</p>
</header>

<section>
    <h2>About Me</h2>
    <p>I am a student passionate about web development and building projects.</p>
</section>

<section>
    <h2>Skills</h2>
    <ul>
        <li>HTML, CSS, JavaScript</li>
        <li>Python (Flask)</li>
        <li>Database (SQLite/MySQL)</li>
    </ul>
</section>

<section>
    <h2>Projects</h2>
    <p>Portfolio Website, Mini Apps, etc.</p>
</section>

<section>
    <h2>Contact Me</h2>
    <form action="http://localhost:5000/submit" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message"></textarea>
        <button type="submit">Send</button>
    </form>
</section>

</body>
</html>
